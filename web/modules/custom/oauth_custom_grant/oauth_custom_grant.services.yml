services:
  oauth_custom_grant.repositories.gmail_user:
    class: Drupal\oauth_custom_grant\Repositories\GmailUserRepository
    arguments:
      - '@user.auth'
      - '@logger.factory'

  oauth_custom_grant.repositories.password_user:
    class: Drupal\oauth_custom_grant\Repositories\PasswordUserRepository
    arguments:
      - '@user.auth'
      - '@logger.factory'

  oauth_custom_grant.firebase_token_verifier:
    class: Drupal\oauth_custom_grant\Service\FirebaseTokenVerifier
    arguments:
      - '@http_client'
      - '@logger.factory'
      - '@cache.default'

  oauth_custom_grant.firebase_user_resolver:
    class: Drupal\oauth_custom_grant\Service\FirebaseUserResolver
    arguments:
      - '@entity_type.manager'
      - '@config.factory'
      - '@logger.factory'
